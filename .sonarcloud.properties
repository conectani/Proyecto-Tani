# Configuration for SonarCloud Automatic Analysis
sonar.projectKey=conectani_Proyecto-Tani
sonar.organization=conectani
sonar.projectName=Proyecto-Tani

# Exclude non-source files and highly duplicated assets from analysis.
# Dockerfiles excluidos: la unica issue restante (docker:S6471, nginx corre como
# root) es el comportamiento estandar de la imagen oficial (baja privilegios en
# los workers) y cambiarla romperia los puertos de los despliegues productivos.
# El Automatic Analysis no soporta sonar.issue.ignore.multicriteria, por lo que
# la exclusion es la unica via sin intervencion manual en la UI.
sonar.exclusions=**/*.sql,**/*.pdf,**/node_modules/**,**/coverage/**,**/dist/**,**/.expo/**,**/assets/**,**/scripts/**,**/Dockerfile*

# Exclude folders and shared files from duplication checks (CPD)
sonar.cpd.exclusions=**/*
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S2245
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*
# docker:S6471 (imagen corre como root): aceptado a proposito. La imagen oficial
# de nginx arranca como root y baja privilegios en los workers; sirve solo
# contenido estatico en plataformas gestionadas (Azure App Service / Render).
# Cambiar a nginx-unprivileged exigiria mover el puerto a >1024 y reconfigurar
# ambos despliegues productivos.
sonar.issue.ignore.multicriteria.e2.ruleKey=docker:S6471
sonar.issue.ignore.multicriteria.e2.resourceKey=**/Dockerfile*
