# Configuration for SonarCloud Automatic Analysis
sonar.projectKey=conectani_Proyecto-Tani
sonar.organization=conectani
sonar.projectName=Proyecto-Tani

# Exclude non-source files and highly duplicated assets from analysis
sonar.exclusions=**/*.sql,**/*.pdf,**/node_modules/**,**/coverage/**,**/dist/**,**/.expo/**,**/assets/**,**/scripts/**

# Exclude folders and shared files from duplication checks (CPD)
sonar.cpd.exclusions=**/*
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S2245
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*
