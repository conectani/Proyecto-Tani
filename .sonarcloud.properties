# Configuration for SonarCloud Automatic Analysis
sonar.projectKey=conectani_Proyecto-Tani
sonar.organization=conectani
sonar.projectName=Proyecto-Tani

# Exclude non-source files and highly duplicated assets from analysis
sonar.exclusions=**/*.sql,**/*.pdf,**/node_modules/**,**/coverage/**,**/dist/**,**/.expo/**,**/assets/**

# Exclude folders and shared files from duplication checks (CPD)
sonar.cpd.exclusions=**/*.sql,**/__tests__/**,**/assets/**,src/Proyecto-tani-admin/**,src/Proyecto-tani/app/_layout.tsx,src/Proyecto-tani/app/politica.tsx,src/Proyecto-tani/app/terminos.tsx,src/Proyecto-tani/app/notificaciones.tsx,src/Proyecto-tani/components/ui/**
