# Configuration for SonarCloud Automatic Analysis
sonar.projectKey=conectani_Proyecto-Tani
sonar.organization=conectani
sonar.projectName=Proyecto-Tani

# Exclude non-source files and highly duplicated assets from analysis
sonar.exclusions=**/*.sql,**/*.pdf,**/node_modules/**,**/coverage/**,**/dist/**,**/.expo/**,**/assets/**

# Exclude specific folders from duplication detection
sonar.cpd.exclusions=**/*.sql,**/__tests__/**,**/assets/**,src/Proyecto-tani-admin/app/(auth)/**,src/Proyecto-tani/app/(auth)/**
