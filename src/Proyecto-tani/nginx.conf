server {
    listen 80;
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # La app también responde bajo /tani/ (mismo build, assets con rutas relativas):
    # se reescribe internamente /tani/x -> /x, sin duplicar archivos en la imagen.
    location /tani/ {
        rewrite ^/tani/(.*)$ /$1 last;
    }

    # Export estático de Expo Router: /login se sirve desde login.html;
    # cualquier ruta desconocida cae al shell de la SPA (index.html).
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
