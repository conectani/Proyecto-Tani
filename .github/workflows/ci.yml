name: ConnecTani DevSecOps Pipeline

on:
  pull_request:
    branches: [ "develop", "main" ]
  push:
    branches: [ "develop", "main" ]

jobs:
  build-and-qa-app:
    name: QA App Beneficiarios (ConnecTani)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Proyecto-tani

    steps:
    - name: 1. Checkout del Codigo Fuente
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 2. Configurar Node.js (v20)
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: src/Proyecto-tani/package-lock.json

    - name: 3. Instalar Dependencias del Entorno
      run: npm ci --ignore-scripts

    - name: 4. Ejecutar Pruebas Automatizadas (Jest & Cobertura Istanbul)
      run: npm run test

    - name: 5. Analisis de Calidad de Codigo (SonarCloud)
      uses: SonarSource/sonarcloud-github-action@master
      continue-on-error: true
      with:
        projectBaseDir: src/Proyecto-tani
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    - name: 6. Analisis de Seguridad de Dependencias (Snyk SCA)
      uses: snyk/actions/node@master
      continue-on-error: true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high
        directory: src/Proyecto-tani

  build-and-qa-admin:
    name: QA App Administrador (Tani Admin)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Proyecto-tani-admin

    steps:
    - name: 1. Checkout del Codigo Fuente
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 2. Configurar Node.js (v20)
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: src/Proyecto-tani-admin/package-lock.json

    - name: 3. Instalar Dependencias del Entorno
      run: npm ci --ignore-scripts

    - name: 4. Ejecutar Control de Estilo (ESLint)
      run: npm run lint

    - name: 5. Analisis de Seguridad de Dependencias (Snyk SCA)
      uses: snyk/actions/node@master
      continue-on-error: true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high
        directory: src/Proyecto-tani-admin

